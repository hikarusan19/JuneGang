<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Access Passcode</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-card">
  <div class="lock-icon">🔐</div>
  <h2>Enter Passcode</h2>
  <div class="sub">8-digit code required</div>

  <!-- single line passcode input -->
  <input type="password" id="passcodeInput" class="passcode-field" placeholder="········" maxlength="8" inputmode="numeric" autocomplete="off">

  <!-- status message -->
  <div id="statusMsg" class="status">Enter 8-digit code</div>

  <!-- minimal helper (collapsible, discreet) -->
  <details class="extra-links">
    <summary>ℹ️ access codes</summary>
    <div class="codes-list">
      <span>06121999 → Ezra/index.html</span>
      <span>15082001 → Ezra/archive1.html</span>
      <span>22111987 → Ezra/notes.html</span>
      <span>03032020 → Ezra/dashboard.html</span>
    </div>
  </details>
</div>

<script>
  (function() {
    // ----- simple route map (8-digit -> target page) -----
    const ROUTES = {
      "06121999": "Ezra/index.html",
      "06181996": "Erica/index.html",
      "06092002": "Ester/index.html",
      "03032020": "Ezra/dashboard.html"
    };

    const passInput = document.getElementById('passcodeInput');
    const statusDiv = document.getElementById('statusMsg');

    // helper: update status message
    function setStatus(text, isError = false, isSuccess = false) {
      statusDiv.textContent = text;
      statusDiv.classList.remove('status-error', 'status-success');
      if (isError) statusDiv.classList.add('status-error');
      if (isSuccess) statusDiv.classList.add('status-success');
    }

    // reset input field
    function resetInput() {
      passInput.value = '';
      setStatus("Enter 8-digit code", false);
      passInput.focus();
    }

    // attempt to validate and redirect
    function attemptUnlock() {
      let code = passInput.value.trim();
      
      // remove any non-digit characters just in case
      code = code.replace(/\D/g, '');
      
      if (code.length !== 8) {
        setStatus(`✗ Need exactly 8 digits (you entered ${code.length})`, true);
        // auto clear after error for better UX
        setTimeout(() => {
          if (passInput.value.length !== 8) {
            // only reset if still invalid
            resetInput();
          }
        }, 1200);
        return false;
      }
      
      // check if code exists in routes
      const target = ROUTES[code];
      if (target) {
        setStatus(`✓ Access granted. Redirecting...`, false, true);
        // disable input during redirect to prevent double submit
        passInput.disabled = true;
        setTimeout(() => {
          window.location.href = target;
        }, 400);
        return true;
      } else {
        setStatus(`✗ Invalid code "${code}". Try again.`, true);
        resetInput();
        return false;
      }
    }

    // auto-submit when 8 digits are entered
    function onInputHandler() {
      let raw = passInput.value;
      // sanitize: allow only digits
      let sanitized = raw.replace(/\D/g, '');
      if (sanitized.length > 8) sanitized = sanitized.slice(0, 8);
      if (sanitized !== raw) {
        passInput.value = sanitized;
      }
      
      // update status hint when typing
      if (sanitized.length === 0) {
        setStatus("Enter 8-digit code", false);
      } else if (sanitized.length < 8) {
        setStatus(`Enter ${8 - sanitized.length} more digit(s)`, false);
      }
      
      // auto-submit when exactly 8 digits
      if (sanitized.length === 8) {
        attemptUnlock();
      }
    }

    // handle paste event: ensure only digits and auto-trigger
    function onPasteHandler(e) {
      e.preventDefault();
      let pastedData = (e.clipboardData || window.clipboardData).getData('text');
      if (!pastedData) return;
      let digits = pastedData.replace(/\D/g, '');
      if (digits.length > 8) digits = digits.slice(0, 8);
      passInput.value = digits;
      // trigger input event manually
      onInputHandler();
    }

    // handle keydown for Enter and backspace/delete behavior
    function onKeydownHandler(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        attemptUnlock();
      }
      // optional: if user presses backspace on empty field, just keep clean
    }

    // initialize event listeners
    passInput.addEventListener('input', onInputHandler);
    passInput.addEventListener('paste', onPasteHandler);
    passInput.addEventListener('keydown', onKeydownHandler);
    
    // initial focus
    passInput.focus();
  })();
</script>
</body>
</html>
